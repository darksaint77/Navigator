<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Навигатор Окръжен съд - Добрич</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        @keyframes pulse-marker {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.4); opacity: 0.6; }
            100% { transform: scale(1); opacity: 1; }
        }
        .pulsing-effect { animation: pulse-marker 1.5s infinite ease-in-out; }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* СТИЛ 3 + УАУ ЕФЕКТ */
        .premium-map-filter {
            filter: contrast(0.85) brightness(1.05) sepia(0.08) hue-rotate(190deg) saturate(0.9);
            mix-blend-mode: multiply;
        }

        .spotlight-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            mix-blend-mode: multiply;
            transition: background 0.4s ease;
            z-index: 5;
        }

        /* Центрирано разположение и симетричен мащаб */
        #zoom-container {
            transform-origin: center center;
            will-change: transform;
            touch-action: none;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body class="bg-gray-50 font-sans min-h-screen flex flex-col overflow-x-hidden select-none">

    <!-- Индикацията за етажа в заглавната лента -->
    <header class="bg-slate-800 text-white text-center py-3 shadow-md z-20">
        <h1 class="text-xl font-bold tracking-wide">СЪДЕБЕН НАВИГАТОР - ДОБРИЧ</h1>
        <div id="section-label" class="inline-block mt-1 bg-blue-600/80 text-[11px] font-bold px-3 py-0.5 rounded-full tracking-wider uppercase transition-colors">
            Етаж 1 - Зали
        </div>
    </header>

    <main class="flex-1 max-w-md mx-auto w-full p-4 flex flex-col space-y-3">
        
        <!-- КАРТАТА С КРАСИВ ФИЛТЪР И СВЕТЛИНЕН ЕФЕКТ -->
        <div class="relative bg-white p-3 rounded-2xl shadow-xl border border-gray-100 flex flex-col">
            
            <!-- Прозорец на картата (Перфектно центриран) -->
            <div id="map-viewport" class="relative w-full border border-gray-100 rounded-xl bg-slate-100 overflow-hidden shadow-inner cursor-grab active:cursor-grabbing flex items-center justify-center" style="height: 290px;">
                <div id="zoom-container" class="absolute w-full h-full">
                    <div class="relative inline-block">
                        <!-- Карта с приложен филтър -->
                        <img id="main-map" src="https://raw.githubusercontent.com/darksaint77/Navigator/main/1-zali.jpg" class="max-w-full max-h-full h-auto block select-none premium-map-filter" alt="Карта" draggable="false">
                        
                        <!-- Слой за динамичното осветяване (Spotlight) -->
                        <div id="map-spotlight" class="spotlight-overlay"></div>

                        <!-- Пулсиращ маркер -->
                        <div id="map-marker" class="absolute w-7 h-7 bg-red-500 border-4 border-white rounded-full shadow-2xl pulsing-effect hidden" style="top: 0%; left: 0%; margin-top: -14px; margin-left: -14px; z-index: 10;">
                            <div class="w-1.5 h-1.5 bg-white rounded-full m-1"></div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- ИЗНЕСЕНИ КОНТРОЛИ -->
            <div class="flex justify-between items-center mt-2 px-1">
                <span class="text-[10px] text-slate-400">💡 Използвайте два пръста за увеличение</span>
                <button onclick="resetZoom()" class="bg-slate-100 active:bg-slate-200 text-slate-700 text-xs font-medium px-3 py-1.5 rounded-lg shadow-sm border border-gray-200 flex items-center gap-1">
                    🔄 Върни мащаба
                </button>
            </div>

            <!-- Инструкции и бутони за преход -->
            <div class="mt-2 bg-slate-50 border-l-4 border-blue-600 p-3 rounded-xl text-xs text-slate-700 flex flex-col space-y-2 shadow-sm">
                <div id="instruction-text" class="font-medium leading-relaxed">📍 Изберете дестинация от менюто по-долу:</div>
                
                <!-- Динамичен бутон за преход към Офиси (Етаж 1) -->
                <button id="transition-btn" onclick="enterOfisiSection()" class="hidden w-full bg-emerald-600 hover:bg-emerald-700 text-white text-center font-bold py-2.5 px-3 rounded-xl shadow-md transition-all transform active:scale-95">
                    🔎 Влез в коридора (Виж офисите)
                </button>
                
                <!-- Бутон за преход към Етаж 2 по стълбите -->
                <button id="stairs-btn" onclick="enterFloor2Section()" class="hidden w-full bg-indigo-600 hover:bg-indigo-700 text-white text-center font-bold py-2.5 px-3 rounded-xl shadow-md transition-all transform active:scale-95">
                    🏃‍♂️ Качи се на Етаж 2 (Заседателни зали)
                </button>
            </div>
        </div>

        <!-- КОНТЕНЕР ЗА МЕНЮТАТА -->
        <div class="bg-white p-4 rounded-2xl shadow-xl border border-gray-100 min-h-[210px] flex flex-col justify-start">
            
            <!-- ГЛАВНО МЕНЮ (ЕТАЖ 1) -->
            <div id="menu-main" class="space-y-2 w-full">
                <div class="text-xs font-bold text-slate-400 uppercase tracking-wider pb-1">Категории</div>
                
                <button onclick="switchMenu('menu-services')" class="w-full bg-slate-700 hover:bg-slate-800 text-white text-sm font-medium py-3 px-4 rounded-xl shadow-sm transition flex justify-between items-center">
                    <span>🏢 Регистратури и услуги</span>
                    <span class="text-slate-400 text-xs">➔</span>
                </button>

                <button onclick="switchMenu('menu-halls')" class="w-full bg-emerald-700 hover:bg-emerald-800 text-white text-sm font-medium py-3 px-4 rounded-xl shadow-sm transition flex justify-between items-center">
                    <span>⚖️ Съдебни зали (1 етаж)</span>
                    <span class="text-emerald-300 text-xs">➔</span>
                </button>

                <div class="text-xs font-bold text-slate-400 uppercase tracking-wider pt-2">Бързи връзки</div>

                <button onclick="locate('stairs_et2')" class="w-full bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium py-2.5 px-4 rounded-xl shadow-sm transition text-left">
                    🏛️ Към етаж 2 съдебни зали
                </button>

                <button onclick="locate('exit')" class="w-full bg-stone-600 hover:bg-stone-700 text-white text-sm font-medium py-2.5 px-4 rounded-xl shadow-sm transition text-left">
                    🚪 Изход съдебна палата
                </button>
            </div>

            <!-- ПОДМЕНЮ: РЕГИСТРАТУРИ И УСЛУГИ -->
            <div id="menu-services" class="space-y-2 w-full hidden">
                <div class="flex justify-between items-center pb-1">
                    <span class="text-xs font-bold text-slate-400 uppercase tracking-wider">Регистратури и услуги</span>
                    <button onclick="switchMenu('menu-main')" class="bg-amber-500 hover:bg-amber-600 text-white text-xs font-bold px-3 py-1 rounded-lg shadow transition">⬅ Назад</button>
                </div>

                <button onclick="locate('reg_os')" class="w-full bg-slate-100 hover:bg-slate-200 text-slate-700 text-sm font-medium py-2.5 px-4 rounded-xl text-left border border-slate-200/60 transition">📥 Регистратура Окръжен съд</button>
                <button onclick="locate('reg_rs')" class="w-full bg-slate-100 hover:bg-slate-200 text-slate-700 text-sm font-medium py-2.5 px-4 rounded-xl text-left border border-slate-200/60 transition">📥 Регистратура Районен съд</button>
                <button onclick="locate('sudimost')" class="w-full bg-slate-100 hover:bg-slate-200 text-slate-700 text-sm font-medium py-2.5 px-4 rounded-xl text-left border border-slate-200/60 transition">📜 Бюро съдимост</button>
                <button onclick="locate('ispalniteli')" class="w-full bg-slate-100 hover:bg-slate-200 text-slate-700 text-sm font-medium py-2.5 px-4 rounded-xl text-left border border-slate-200/60 transition">💼 Съдебно изпълнителна служба</button>
                <button onclick="locate('prizovkari')" class="w-full bg-slate-100 hover:bg-slate-200 text-slate-700 text-sm font-medium py-2.5 px-4 rounded-xl text-left border border-slate-200/60 transition">✉️ Призовкари</button>
            </div>

            <!-- ПОДМЕНЮ: СЪДЕБНИ ЗАЛИ (ЕТАЖ 1) -->
            <div id="menu-halls" class="space-y-2 w-full hidden">
                <div class="flex justify-between items-center pb-1">
                    <span class="text-xs font-bold text-slate-400 uppercase tracking-wider">Избор на зала</span>
                    <button onclick="switchMenu('menu-main')" class="bg-amber-500 hover:bg-amber-600 text-white text-xs font-bold px-3 py-1 rounded-lg shadow transition">⬅ Назад</button>
                </div>

                <button onclick="locate('zala1')" class="w-full bg-emerald-50 hover:bg-emerald-100 text-emerald-800 text-sm font-medium py-2.5 px-4 rounded-xl text-left border border-emerald-200/60 transition">⚖️ Заседателна зала 1 - РС</button>
                <button onclick="locate('zala2')" class="w-full bg-emerald-50 hover:bg-emerald-100 text-emerald-800 text-sm font-medium py-2.5 px-4 rounded-xl text-left border border-emerald-200/60 transition">⚖️ Заседателна зала 2 - РС</button>
                <button onclick="locate('zala3')" class="w-full bg-emerald-50 hover:bg-emerald-100 text-emerald-800 text-sm font-medium py-2.5 px-4 rounded-xl text-left border border-emerald-200/60 transition">⚖️ Заседателна зала 3 - РС</button>
                <button onclick="locate('zala4')" class="w-full bg-emerald-50 hover:bg-emerald-100 text-emerald-800 text-sm font-medium py-2.5 px-4 rounded-xl text-left border border-emerald-200/60 transition">⚖️ Заседателна зала 4 - РС</button>
            </div>

            <!-- СПЕЦИАЛНО МЕНЮ ПРИ ПРЕСТОЙ В СЕКТОР ОФИСИ -->
            <div id="menu-back-to-main" class="space-y-2 w-full hidden flex-1 flex flex-col justify-center">
                <p class="text-xs text-slate-400 text-center mb-2">Намирате се в сектор Офиси / Долен коридор</p>
                <button onclick="exitOfisiSection()" class="w-full bg-rose-600 hover:bg-rose-700 text-white font-bold py-3 px-4 rounded-xl shadow-md transition text-center">
                    ⬅ Върни се в централния салон
                </button>
            </div>

            <!-- НОВО МЕНЮ: СЪДЕБНИ ЗАЛИ (ЕТАЖ 2) -->
            <div id="menu-floor2-halls" class="space-y-2 w-full hidden">
                <div class="flex justify-between items-center pb-1">
                    <span class="text-xs font-bold text-slate-400 uppercase tracking-wider">Етаж 2 - Зали</span>
                    <button onclick="exitFloor2Section()" class="bg-rose-600 hover:bg-rose-700 text-white text-xs font-bold px-3 py-1 rounded-lg shadow transition">⬅ Слез на Етаж 1</button>
                </div>

                <button onclick="locate('zala5')" class="w-full bg-indigo-50 hover:bg-indigo-100 text-indigo-800 text-sm font-medium py-2.5 px-4 rounded-xl text-left border border-indigo-200/60 transition">⚖️ Заседателна зала 5 - ОС</button>
                <button onclick="locate('zala6')" class="w-full bg-indigo-50 hover:bg-indigo-100 text-indigo-800 text-sm font-medium py-2.5 px-4 rounded-xl text-left border border-indigo-200/60 transition">⚖️ Заседателна зала 6 - ОС</button>
                <button onclick="locate('zala7')" class="w-full bg-indigo-50 hover:bg-indigo-100 text-indigo-800 text-sm font-medium py-2.5 px-4 rounded-xl text-left border border-indigo-200/60 transition">⚖️ Заседателна зала 7 - РС</button>
                <button onclick="locate('zala8')" class="w-full bg-indigo-50 hover:bg-indigo-100 text-indigo-800 text-sm font-medium py-2.5 px-4 rounded-xl text-left border border-indigo-200/60 transition">⚖️ Заседателна зала 8 - ОС</button>
                <button onclick="locate('mediation')" class="w-full bg-slate-100 hover:bg-slate-200 text-slate-700 text-sm font-medium py-2.5 px-4 rounded-xl text-left border border-slate-200/60 transition">🤝 Зала медиация</button>
            </div>

        </div>

    </main>

    <footer class="bg-slate-200 text-center py-2.5 text-xs text-slate-400 border-t border-slate-300 z-20 font-medium tracking-wide">
        ОКРЪЖЕН СЪД ДОБРИЧ © 2026
    </footer>

    <script>
        const mapImg = document.getElementById('main-map');
        const container = document.getElementById('zoom-container');
        const viewport = document.getElementById('map-viewport');
        const marker = document.getElementById('map-marker');
        const spotlight = document.getElementById('map-spotlight');
        
        let MAP_ZALI = "";
        let MAP_OFISI = "";
        let MAP_FLOOR2 = "https://raw.githubusercontent.com/darksaint77/Navigator/main/2-zali.jpg";
        let currentMapState = 'zali';
        let pendingOfficeTarget = ''; // Помни накъде отиваме при прехода

        let scale = 1;
        let pointX = 0;
        let pointY = 0;
        let startX = 0;
        let startY = 0;
        let isPanning = false;
        let touchStartDist = 0;

        window.addEventListener('load', () => {
            const baseUrl = mapImg.src.substring(0, mapImg.src.lastIndexOf('/') + 1);
            MAP_ZALI = mapImg.src;
            MAP_OFISI = baseUrl + "1-ofisi.jpg";

            new Image().src = MAP_OFISI;
            new Image().src = MAP_FLOOR2;
            
            updateTransform();
        });

        function updateTransform() {
            if (scale < 1) scale = 1;
            if (scale > 4) scale = 4;
            
            if (scale === 1) {
                pointX = 0;
                pointY = 0;
            } else {
                const boundX = (viewport.offsetWidth * scale - viewport.offsetWidth) / 2;
                const boundY = (viewport.offsetHeight * scale - viewport.offsetHeight) / 2;

                if (pointX > boundX) pointX = boundX;
                if (pointX < -boundX) pointX = -boundX;
                if (pointY > boundY) pointY = boundY;
                if (pointY < -boundY) pointY = -boundY;
            }

            container.style.transform = `translate(${pointX}px, ${pointY}px) scale(${scale})`;
        }

        // СЪБИТИЯ ЗА МИШКА
        viewport.addEventListener('mousedown', (e) => {
            e.preventDefault();
            startX = e.clientX - pointX;
            startY = e.clientY - pointY;
            isPanning = true;
        });

        window.addEventListener('mousemove', (e) => {
            if (!isPanning) return;
            pointX = e.clientX - startX;
            pointY = e.clientY - startY;
            updateTransform();
        });

        window.addEventListener('mouseup', () => { isPanning = false; });

        viewport.addEventListener('wheel', (e) => {
            e.preventDefault();
            let zoomFactor = 1.1;
            if (e.deltaY > 0) zoomFactor = 1 / zoomFactor;
            scale *= zoomFactor;
            updateTransform();
        });

        // СЪБИТИЯ ЗА ТЪЧ
        viewport.addEventListener('touchstart', (e) => {
            if (e.touches.length === 1) {
                isPanning = true;
                startX = e.touches[0].clientX - pointX;
                startY = e.touches[0].clientY - pointY;
            } else if (e.touches.length === 2) {
                isPanning = false;
                touchStartDist = Math.hypot(
                    e.touches[0].clientX - e.touches[1].clientX,
                    e.touches[0].clientY - e.touches[1].clientY
                );
            }
        });

        viewport.addEventListener('touchmove', (e) => {
            if (isPanning && e.touches.length === 1) {
                pointX = e.touches[0].clientX - startX;
                pointY = e.touches[0].clientY - startY;
                updateTransform();
            } else if (e.touches.length === 2) {
                const dist = Math.hypot(
                    e.touches[0].clientX - e.touches[1].clientX,
                    e.touches[0].clientY - e.touches[1].clientY
                );
                const factor = dist / touchStartDist;
                touchStartDist = dist;
                scale *= factor;
                updateTransform();
            }
        });

        viewport.addEventListener('touchend', () => { isPanning = false; touchStartDist = 0; });

        function resetZoom() {
            scale = 1;
            pointX = 0;
            pointY = 0;
            updateTransform();
        }

        const targets = {
            // ЕТАЖ 1
            'exit': { map: 'zali', x: 94, y: 35, text: "Насочете се към изхода на съдебната палата през пропуска за граждани." },
            'stairs_et2': { map: 'zali', x: 53, y: 57, text: "Насочете се към централното стълбище, за да се качите към втория етаж. Когато стигнете пред стълбите, натиснете бутона по-долу." },
            'prizovkari': { map: 'zali', x: 28, y: 59, text: "Кабинетът на призовкарите се намира на първия етаж." },
            'zala3': { map: 'zali', x: 12, y: 60, text: "Заседателна зала 3 на Районен съд се намира в лявото крило." },
            'reg_os': { map: 'zali', x: 15, y: 29, text: "Регистратурата на Окръжен съд се намира в лявата част на централния салон." },
            'reg_rs': { map: 'zali', x: 24, y: 32, text: "Регистратурата на Районен съд се намира в централния салон." },
            'zala2': { map: 'zali', x: 28, y: 13, text: "Заседателна зала 2 на Районен съд се намира в горния ляв сектор." },
            'zala1': { map: 'zali', x: 48, y: 15, text: "Заседателна зала 1 на Районен съд се намира в горния коридор." },
            'zala4': { map: 'zali', x: 70, y: 13, text: "Заседателна зала 4 на Районен съд се намира в горното дясно крило." },
            
            // ПРЕХОДИ КЪМ КОРЕДОРА НА ОФИСИТЕ
            'sudimost': { map: 'zali', x: 67, y: 90, next: 'sudimost_room', text: "Продължете по коридора надолу вдясно към прехода за Бюро съдимост. Когато стигнете там, натиснете бутона по-долу." },
            'ispalniteli': { map: 'zali', x: 67, y: 90, next: 'ispalniteli_room', text: "Продължете по коридора надолу вдясно към Съдебно изпълнителна служба. Когато стигнете там, натиснете бутона по-долу." },
            
            // ОФИСИ В КОРИДОРА
            'sudimost_room': { map: 'ofisi', x: 37, y: 72, text: "Вие сте в секцията с офиси. Бюро съдимост е Стая 105, намираща се в долния коридор." },
            'ispalniteli_room': { map: 'ofisi', x: 37, y: 34, text: "Вие сте в секцията с офиси. Съдебно изпълнителна служба е Стая 108, намираща се в горния коридор." },
            
            // ЕТАЖ 2
            'zala8': { map: 'floor2', x: 84, y: 41, text: "Заседателна зала 8 на Окръжен съд се намира в десния край на коридора на Етаж 2." },
            'zala5': { map: 'floor2', x: 69, y: 86, text: "Заседателна зала 5 на Окръжен съд се намира на Етаж 2, вдясно по коридора." },
            'zala6': { map: 'floor2', x: 50, y: 86, text: "Заседателна зала 6 на Окръжен съд се намира на Етаж 2, точно срещу стълбището." },
            'zala7': { map: 'floor2', x: 12, y: 85, text: "Заседателна зала 7 на Районен съд се намира в левия край на коридора на Етаж 2." },
            'mediation': { map: 'floor2', x: 24, y: 86, text: "Залата за медиация се намира на Етаж 2, в лявото крило до Зала 7." }
        };

        function locate(key) {
            const data = targets[key];
            if (!data) return;

            document.getElementById('transition-btn').classList.add('hidden');
            document.getElementById('stairs-btn').classList.add('hidden');

            if (data.map === 'zali' && currentMapState !== 'zali') {
                switchToMap('zali');
            } else if (data.map === 'floor2' && currentMapState !== 'floor2') {
                switchToMap('floor2');
            }

            marker.style.left = data.x + "%";
            marker.style.top = data.y + "%";
            marker.classList.remove('hidden');

            spotlight.style.background = `radial-gradient(circle 50px at ${data.x}% ${data.y}%, rgba(255,255,255,1) 0%, rgba(200,205,215,0.85) 100%)`;

            document.getElementById('instruction-text').innerHTML = `<strong>🚶‍♂️ Напътствие:</strong> ${data.text}`;

            if (key === 'sudimost' || key === 'ispalniteli') {
                pendingOfficeTarget = data.next;
                document.getElementById('transition-btn').classList.remove('hidden');
            } else if (key === 'stairs_et2') {
                document.getElementById('stairs-btn').classList.remove('hidden');
            }
        }

        function enterOfisiSection() {
            switchToMap('ofisi');
            switchMenu('menu-back-to-main');
            if (pendingOfficeTarget) {
                locate(pendingOfficeTarget);
                pendingOfficeTarget = '';
            } else {
                locate('sudimost_room');
            }
        }

        function exitOfisiSection() {
            switchToMap('zali');
            switchMenu('menu-main');
            clearActiveState();
        }

        function enterFloor2Section() {
            switchToMap('floor2');
            switchMenu('menu-floor2-halls');
            marker.style.left = "44%";
            marker.style.top = "45%";
            marker.classList.remove('hidden');
            spotlight.style.background = `radial-gradient(circle 50px at 44% 45%, rgba(255,255,255,1) 0%, rgba(200,205,215,0.85) 100%)`;
            document.getElementById('instruction-text').innerHTML = "<strong>🏛️ Вие сте на Етаж 2:</strong> Изберете съдебна зала от менюто.";
        }

        function exitFloor2Section() {
            switchToMap('zali');
            switchMenu('menu-main');
            clearActiveState();
        }

        function clearActiveState() {
            marker.classList.add('hidden');
            spotlight.style.background = 'none';
            document.getElementById('instruction-text').innerText = "📍 Изберете категория от менюто по-долу:";
            document.getElementById('transition-btn').classList.add('hidden');
            document.getElementById('stairs-btn').classList.add('hidden');
        }

        function switchToMap(mapName) {
            const label = document.getElementById('section-label');
            mapImg.className = "max-w-full max-h-full h-auto block select-none premium-map-filter";
            
            if (mapName === 'ofisi') {
                mapImg.src = MAP_OFISI;
                label.innerText = "Етаж 1 - Офиси";
                label.className = "inline-block mt-1 bg-emerald-600/80 text-[11px] font-bold px-3 py-0.5 rounded-full tracking-wider uppercase transition-colors";
                currentMapState = 'ofisi';
            } else if (mapName === 'floor2') {
                mapImg.src = MAP_FLOOR2;
                label.innerText = "Етаж 2 - Зали";
                label.className = "inline-block mt-1 bg-indigo-600/80 text-[11px] font-bold px-3 py-0.5 rounded-full tracking-wider uppercase transition-colors";
                currentMapState = 'floor2';
            } else {
                mapImg.src = MAP_ZALI;
                label.innerText = "Етаж 1 - Зали";
                label.className = "inline-block mt-1 bg-blue-600/80 text-[11px] font-bold px-3 py-0.5 rounded-full tracking-wider uppercase transition-colors";
                currentMapState = 'zali';
            }
            document.getElementById('transition-btn').classList.add('hidden');
            document.getElementById('stairs-btn').classList.add('hidden');
            spotlight.style.background = 'none';
            resetZoom();
        }

        function switchMenu(menuId) {
            document.getElementById('menu-main').classList.add('hidden');
            document.getElementById('menu-services').classList.add('hidden');
            document.getElementById('menu-halls').classList.add('hidden');
            document.getElementById('menu-back-to-main').classList.add('hidden');
            document.getElementById('menu-floor2-halls').classList.add('hidden');
            
            document.getElementById(menuId).classList.remove('hidden');
        }
    </script>
</body>
</html>
