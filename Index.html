<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Навигатор Окръжен съд - Добрич</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        @keyframes pulse-marker {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.4); opacity: 0.6; }
            100% { transform: scale(1); opacity: 1; }
        }
        .pulsing-effect { animation: pulse-marker 1.5s infinite ease-in-out; }
    </style>
</head>
<body class="bg-gray-100 font-sans min-h-screen flex flex-col">

    <header class="bg-slate-800 text-white text-center py-4 shadow-md">
        <h1 class="text-xl font-bold tracking-wide">СЪДЕБЕН НАВИГАТОР - ДОБРИЧ</h1>
        <p class="text-xs text-slate-300 mt-1">Окръжен и Районен съд | Етаж 1</p>
    </header>

    <main class="flex-1 max-w-md mx-auto w-full p-4 flex flex-col space-y-4">
        
        <div class="relative bg-white p-3 rounded-xl shadow-md border border-gray-200">
            <div class="absolute top-5 left-5 bg-blue-600 text-white text-xs font-bold px-2.5 py-1 rounded-full shadow z-10">
                Етаж 1
            </div>
            
            <div class="relative w-full border border-gray-100 rounded-lg bg-slate-50 mt-1 overflow-hidden">
                <img id="main-map" src="https://dobrich-os.justice.bg//upload/140962/1-zali.jpg" class="w-full h-auto block" alt="Карта Етаж 1">
                
                <div id="map-marker" class="absolute w-6 h-6 bg-red-600 border-2 border-white rounded-full shadow-lg pulsing-effect hidden" style="top: 0%; left: 0%; margin-top: -12px; margin-left: -12px; z-index: 10;">
                    <div class="w-2 h-2 bg-white rounded-full m-1.5"></div>
                </div>
            </div>

            <div id="instruction-box" class="mt-3 bg-amber-50 border-l-4 border-amber-500 p-3 rounded text-sm text-amber-900 font-medium">
                📍 Изберете дестинация от бутоните по-долу, за да видите точното местоположение:
            </div>
        </div>

        <div class="bg-white p-4 rounded-xl shadow-md border border-gray-200 space-y-2">
            
            <button onclick="locate('reg_os')" class="w-full bg-slate-700 hover:bg-slate-800 text-white text-sm font-medium py-3 px-4 rounded-lg transition flex justify-between items-center text-left">
                <span>📥 Регистратура Окръжен съд</span>
                <span class="text-xs bg-slate-600 px-2 py-0.5 rounded whitespace-nowrap">Стая 102</span>
            </button>

            <button onclick="locate('reg_rs')" class="w-full bg-slate-700 hover:bg-slate-800 text-white text-sm font-medium py-3 px-4 rounded-lg transition flex justify-between items-center text-left">
                <span>📥 Регистратура Районен съд</span>
                <span class="text-xs bg-slate-600 px-2 py-0.5 rounded whitespace-nowrap">Деловодство</span>
            </button>

            <button onclick="locate('stairs_et2')" class="w-full bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium py-3 px-4 rounded-lg transition flex justify-between items-center text-left">
                <span>🏛️ Стълбище към Етаж 2</span>
                <span class="text-xs bg-blue-500 px-2 py-0.5 rounded whitespace-nowrap">Към зали</span>
            </button>

            <button onclick="locate('offices')" class="w-full bg-slate-700 hover:bg-slate-800 text-white text-sm font-medium py-3 px-4 rounded-lg transition flex justify-between items-center text-left">
                <span>🏢 Етаж 1 към офиси</span>
                <span class="text-xs bg-slate-600 px-2 py-0.5 rounded whitespace-nowrap">Коридор</span>
            </button>

            <button onclick="locate('exit')" class="w-full bg-stone-600 hover:bg-stone-700 text-white text-sm font-medium py-3 px-4 rounded-lg transition flex justify-between items-center text-left">
                <span>🚪 Изход съдебна палата</span>
                <span class="text-xs bg-stone-500 px-2 py-0.5 rounded whitespace-nowrap">Пропуск</span>
            </button>
            
        </div>

    </main>

    <footer class="bg-slate-200 text-center py-3 text-xs text-gray-500 border-t border-gray-300">
        Окръжен съд Добрич © 2026
    </footer>

    <script>
        // Обновени и коригирани координати
        const targets = {
            'reg_os': { x: 14, y: 31, text: "Регистратурата на Окръжен съд се намира в посочената зона на Етаж 1 (Стая 102)." },
            'reg_rs': { x: 25, y: 32, text: "Регистратурата на Районен съд се намира на Етаж 1, непосредствено до сектор Деловодство." },
            'stairs_et2': { x: 52, y: 56, text: "Насочете се към стълбището, за да се качите към втория етаж, където се намират съдебните зали." },
            'offices': { x: 67, y: 89, text: "Този коридор води към административните офиси на първия етаж." },
            'exit': { x: 94, y: 34, text: "Насочете се към изхода на съдебната палата през пропуска за граждани." }
        };

        function locate(key) {
            const data = targets[key];
            if (!data) return;

            const marker = document.getElementById('map-marker');
            marker.style.left = data.x + "%";
            marker.style.top = data.y + "%";
            marker.classList.remove('hidden');

            document.getElementById('instruction-box').innerText = "🚶‍♂️ " + data.text;
        }
    </script>
</body>
</html>
